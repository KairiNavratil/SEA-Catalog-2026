<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Twitch Streamer Catalog</title>
  <link rel="stylesheet" href="style.css">

  <!-- Modern clean typography: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Clean minimalist Icons: Lucide -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
  <!-- Sticky Header -->
  <header class="main-header">
    <div class="header-container">
      <div class="logo">
        <i data-lucide="twitch"></i>
        <span>Twitch Catalog</span>
      </div>
      <nav class="header-nav" style="display: flex; gap: 2rem; font-weight: 500;">
        <a href="index.html" class="active" style="color: var(--text-primary); text-decoration: none;">Catalog</a>
        <a href="twitchdle.html" style="color: var(--text-muted); text-decoration: none;">Twitchdle</a>
      </nav>
    </div>
  </header>



  <!-- Grid for the Catalog -->
  <main class="catalog-main">
    <div class="catalog-header">
      <div class="catalog-title-group">
        <h2>Top Streamers</h2>
        <p class="catalog-subtitle" style="color: var(--text-secondary); font-size: 0.9rem; margin-top: 4px;">Showing 25 of 1000 channels</p>
      </div>
      <div class="search-filters">
        <div class="search-bar">
          <i data-lucide="search"></i>
          <input type="text" id="searchInput" placeholder="Find your streamer (ex. Ludwig)" autocomplete="off">
        </div>
        <button class="filter-btn">
          <i data-lucide="sliders-horizontal"></i>
          Filters
        </button>
      </div>
      <div class="view-options">
        <label for="pageSize">Per page:</label>
        <select id="pageSize">
          <option value="25">25</option>
          <option value="50">50</option>
          <option value="100">100</option>
          <option value="250">250</option>
          <option value="500">500</option>
          <option value="1000">1000</option>
        </select>
      </div>
    </div>

    <!-- Template Card (Hidden and outside the container so it doesn't get wiped by innerHTML = "") -->
    <div class="streamer-card card template" style="display: none;">
      <div class="card-banner"></div>
      <img src="https://unavatar.io/twitch/example" alt="Avatar" class="card-avatar">
      <div class="card-content">
        <h2 class="streamer-name">
          StreamerName
          <i data-lucide="check-circle-2" class="partner-icon"></i>
        </h2>
        <div class="streamer-stats">
          <div class="stat-item" title="Category / Game">
            <i data-lucide="gamepad-2"></i>
            <span>Gaming</span>
          </div>
          <div class="stat-item" title="Reach / Followers">
            <i data-lucide="users"></i>
            <span>15.2K</span>
          </div>
          <div class="stat-item" title="Growth">
            <i data-lucide="trending-up"></i>
            <span>+2.4%</span>
          </div>
        </div>
      </div>
    </div>

    <!-- The Grid Container -->
    <div class="grid-container" id="card-container">
    </div>
  </main>

  <!-- Pagination Navigation Bar at bottom -->
  <nav class="pagination-nav">
    <button class="page-btn" id="prevPage" disabled><i data-lucide="chevron-left"></i> Prev</button>
    <div class="page-info">
      Page <span id="currentPageDisplay">1</span> of <span id="totalPagesDisplay">40</span>
    </div>
    <button class="page-btn" id="nextPage">Next <i data-lucide="chevron-right"></i></button>
  </nav>

  <!-- Initialize Lucide icons -->
  <script>
    lucide.createIcons();
  </script>

  <!-- Data -->
  <script src="twitchData.js"></script>
  <!-- Application Logic -->
  <script src="testing.js"></script>
</body>

</html>
